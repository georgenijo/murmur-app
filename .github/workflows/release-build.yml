name: Release Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      prime_caches:
        description: Save trusted main release caches after this non-publishing rehearsal
        type: boolean
        default: false

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  context:
    if: "${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'chore: bump version') }}"
    runs-on: ubuntu-latest
    outputs:
      source-sha: ${{ steps.context.outputs.source_sha }}
      cache-write: ${{ steps.context.outputs.cache_write }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate trusted main source
        id: context
        env:
          PRIME_CACHES: ${{ inputs.prime_caches || false }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "ERROR: release builds may only execute from the trusted main branch"
            exit 1
          fi
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "ERROR: release source $GITHUB_SHA is not on origin/main"
            exit 1
          fi

          CACHE_WRITE=false
          if [ "$GITHUB_EVENT_NAME" = "push" ] || [ "$PRIME_CACHES" = "true" ]; then
            CACHE_WRITE=true
          fi
          echo "source_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "cache_write=$CACHE_WRITE" >> "$GITHUB_OUTPUT"
          {
            echo "### Trusted release build"
            echo "- source: \`$GITHUB_SHA\`"
            echo "- event: \`$GITHUB_EVENT_NAME\`"
            echo "- cache write authorized: \`$CACHE_WRITE\`"
            echo "- publication: disabled (artifacts only)"
          } >> "$GITHUB_STEP_SUMMARY"

  typecheck:
    needs: context
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.context.outputs.source-sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: cd app && npm ci

      - name: TypeScript check
        run: cd app && npx tsc --noEmit

      - name: Unit tests
        run: cd app && npm test

      - name: Workflow and artifact policy tests
        run: |
          python3 scripts/validate_workflow_policy.py
          python3 -m unittest tests/test_release_artifacts.py tests/test_workflow_policy.py

  release-macos:
    needs: context
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.context.outputs.source-sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore release-profile Rust cache
        id: rust-cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
          shared-key: macos-release-v1
          key: profile-release
          add-job-id-key: false
          save-if: ${{ needs.context.outputs.cache-write == 'true' }}

      - name: Install frontend dependencies
        run: cd app && npm ci

      - name: Locate clang runtime for ggml-metal symbol resolution
        run: |
          CLANG_RT=$(find /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang \
            -name "libclang_rt.osx.a" 2>/dev/null | sort -V | tail -1)
          if [ -z "$CLANG_RT" ]; then
            echo "ERROR: libclang_rt.osx.a not found"
            exit 1
          fi
          echo "RUSTFLAGS=-C link-arg=$CLANG_RT -C link-arg=-mmacosx-version-min=14.0 -C link-arg=-Wl,-rpath,/usr/lib/swift" >> "$GITHUB_ENV"

      - name: Build local-LLM sidecar
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          CMAKE_OSX_DEPLOYMENT_TARGET: "14.0"
          CMAKE_C_FLAGS: "-march=armv8.5-a -mmacosx-version-min=14.0"
          CMAKE_CXX_FLAGS: "-march=armv8.5-a -mmacosx-version-min=14.0"
        run: |
          # RUSTFLAGS (libclang_rt for ggml-metal symbols) is already exported by
          # the previous step; the sidecar links the same Metal ggml backend and
          # needs it too. The script places the arm64 binary at the target-triple
          # path Tauri's macOS externalBin overlay expects.
          python3 scripts/build_local_llm_sidecar.py --release

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] || {
            echo "ERROR: APPLE_CERTIFICATE and APPLE_CERTIFICATE_PASSWORD must be set"; exit 1; }
          KEYCHAIN="$RUNNER_TEMP/murmur-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          CERT="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT"
          security import "$CERT" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$CERT"

      - name: Build unsigned application
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          CMAKE_OSX_DEPLOYMENT_TARGET: "14.0"
          CMAKE_C_FLAGS: "-march=armv8.5-a -mmacosx-version-min=14.0"
          CMAKE_CXX_FLAGS: "-march=armv8.5-a -mmacosx-version-min=14.0"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # Tauri applies one entitlement file to the main binary and every
          # externalBin, so its stock signing cannot give the helper its stricter
          # sandbox-only entitlements. Build unsigned; the repository-owned
          # finalizer signs nested code inside-out afterwards. Only the .app
          # bundle is produced here; the DMG and updater archive are rebuilt from
          # the finalized, notarized app in the next step.
          cd app && npx tauri build --no-sign --bundles app --verbose

      - name: Finalize, notarize, and repackage
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SIGNING_KEYCHAIN: ${{ runner.temp }}/murmur-signing.keychain-db
        run: |
          set -euo pipefail
          for VAR in APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID TAURI_SIGNING_PRIVATE_KEY; do
            [ -n "${!VAR}" ] || { echo "ERROR: $VAR must be set"; exit 1; }
          done
          BUNDLE_MACOS=app/src-tauri/target/release/bundle/macos
          APP=$(find "$BUNDLE_MACOS" -maxdepth 1 -name '*.app' -print -quit)
          if [ -z "$APP" ]; then
            echo "ERROR: unsigned application bundle is missing"
            exit 1
          fi
          VERSION=$(python3 -c "import json,sys;print(json.load(open('app/src-tauri/tauri.conf.json'))['version'])")

          # Sign nested code inside-out with per-binary entitlements and fail
          # closed unless strict verification passes (helper sandbox entitlement,
          # arm64, hardened runtime, fixed identifier, shared Team ID).
          python3 scripts/finalize_macos_bundle.py \
            --app "$APP" \
            --identity "$APPLE_SIGNING_IDENTITY" \
            --main-entitlements app/src-tauri/entitlements.plist \
            --helper-entitlements app/src-tauri/local-llm-sidecar.entitlements.plist \
            --expected-team-id "$APPLE_TEAM_ID"

          # Notarize + staple the finalized app, then rebuild the DMG and the
          # updater .app.tar.gz (+ Ed25519 signature) FROM that finalized app.
          # Apple/Tauri secrets are read from the environment by the script.
          python3 scripts/notarize_and_repackage_macos.py \
            --app "$APP" \
            --app-dir app \
            --identity "$APPLE_SIGNING_IDENTITY" \
            --version "$VERSION" \
            --arch aarch64 \
            --dmg-out app/src-tauri/target/release/bundle/dmg

          # Mirror the rehearsal's Gatekeeper evidence on the release path.
          xcrun stapler validate "$APP"
          spctl --assess --type execute -vvv "$APP"

      - name: Smoke test signed application
        run: |
          APP=$(find app/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)
          if [ -z "$APP" ]; then
            echo "ERROR: signed application bundle is missing"
            exit 1
          fi
          EXECUTABLE=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP/Contents/Info.plist")
          BINARY="$APP/Contents/MacOS/$EXECUTABLE"
          if [ -z "$EXECUTABLE" ] || [ ! -x "$BINARY" ]; then
            echo "ERROR: signed application bundle or binary is missing"
            exit 1
          fi
          "$BINARY" &
          PID=$!
          for i in 1 2 3 4 5; do
            sleep 1
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "ERROR: signed application exited after ${i}s"
              exit 1
            fi
          done
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true

      - name: Stage immutable macOS artifacts
        env:
          SOURCE_SHA: ${{ needs.context.outputs.source-sha }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p release-artifacts
          find app/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' \
            -exec cp {} release-artifacts/ \;
          find app/src-tauri/target/release/bundle/macos -maxdepth 1 -type f \
            \( -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \) \
            -exec cp {} release-artifacts/ \;
          ARCH=$(uname -m)
          [ "$ARCH" = "arm64" ] && ARCH=aarch64

          # Record local-LLM helper provenance from the finalized bundle: hash,
          # architecture, designated requirement, Team ID, and entitlement digest.
          APP=$(find app/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)
          HELPER="$APP/Contents/MacOS/murmur-llm-sidecar"
          if [ ! -f "$HELPER" ]; then
            echo "ERROR: finalized bundle is missing the local-LLM helper"
            exit 1
          fi
          HELPER_SHA=$(shasum -a 256 "$HELPER" | awk '{print $1}')
          HELPER_ARCH=$(lipo -archs "$HELPER" | tr -d ' \n')
          HELPER_DR=$(codesign -d -r- "$HELPER" 2>&1 | sed -n 's/^#* *designated => //p')
          if [ -z "$HELPER_DR" ]; then
            echo "ERROR: could not read the helper designated requirement"
            exit 1
          fi
          codesign -d --entitlements :- --xml "$HELPER" > "$RUNNER_TEMP/helper-entitlements.xml" 2>/dev/null
          HELPER_ENT_SHA=$(shasum -a 256 "$RUNNER_TEMP/helper-entitlements.xml" | awk '{print $1}')

          python3 scripts/release_artifacts.py record \
            --platform macos \
            --platform-key "darwin-${ARCH}" \
            --artifacts release-artifacts \
            --commit-sha "$SOURCE_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --helper-sha256 "$HELPER_SHA" \
            --helper-arch "$HELPER_ARCH" \
            --helper-designated-requirement "$HELPER_DR" \
            --helper-team-id "$APPLE_TEAM_ID" \
            --helper-entitlement-sha256 "$HELPER_ENT_SHA"

      - name: Upload immutable macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ needs.context.outputs.source-sha }}
          path: release-artifacts
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: true

      - name: Summarize macOS cache
        run: |
          {
            echo "### macOS release cache"
            echo "- restore hit: \`${{ steps.rust-cache.outputs.cache-hit || 'false' }}\`"
            echo "- write authorized: \`${{ needs.context.outputs.cache-write }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Delete signing keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/murmur-signing.keychain-db" 2>/dev/null || true

  release-linux:
    needs: context
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.context.outputs.source-sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Free disk space for CUDA release build
        run: |
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          docker system prune --all --force || true

      - name: Setup minimal Linux release environment
        uses: ./.github/actions/setup-linux-build
        with:
          cuda-version: '12.8.0'
          rust-cache-shared-key: linux-cuda-release-v1
          rust-cache-save-if: ${{ needs.context.outputs.cache-write == 'true' }}
          cuda-cache-save-if: ${{ needs.context.outputs.cache-write == 'true' }}

      - name: Install frontend dependencies
        run: cd app && npm ci

      - name: Build signed packages
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          args: --bundles deb,appimage --verbose

      - name: Install package smoke-test dependencies
        run: sudo apt-get install -y xvfb dbus-x11 at-spi2-core

      - name: Smoke test deb and AppImage packages
        run: |
          LOG="$HOME/.local/share/local-dictation/logs/app.log"
          DEB=$(find app/src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' -print -quit)
          APPIMAGE=$(find app/src-tauri/target/release/bundle/appimage -maxdepth 1 -type f -name '*.AppImage' -print -quit)
          if [ -z "$DEB" ] || [ -z "$APPIMAGE" ]; then
            echo "ERROR: deb or AppImage package is missing"
            exit 1
          fi

          rm -rf /tmp/murmur-deb-root
          mkdir -p /tmp/murmur-deb-root
          dpkg-deb -x "$DEB" /tmp/murmur-deb-root
          DEB_BINARY=/tmp/murmur-deb-root/usr/bin/ui
          if [ ! -x "$DEB_BINARY" ]; then
            echo "ERROR: deb package is missing the ui application executable"
            exit 1
          fi
          rm -f "$LOG"
          LD_LIBRARY_PATH="$CUDA_DRIVER_STUB_DIR${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}" \
            xvfb-run -a dbus-run-session -- "$DEB_BINARY" >/tmp/murmur-deb-smoke.log 2>&1 &
          PID=$!
          for i in $(seq 1 20); do
            sleep 1
            if ! kill -0 "$PID" 2>/dev/null; then
              tail -80 /tmp/murmur-deb-smoke.log || true
              echo "ERROR: deb executable exited during smoke test"
              exit 1
            fi
            grep -q '\[main\] App mounted' "$LOG" 2>/dev/null && break
          done
          grep -q '\[main\] App mounted' "$LOG" || { echo "ERROR: deb frontend did not mount"; exit 1; }
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true

          chmod +x "$APPIMAGE"
          rm -f "$LOG"
          LD_LIBRARY_PATH="$CUDA_DRIVER_STUB_DIR${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}" \
            xvfb-run -a dbus-run-session -- "$APPIMAGE" --appimage-extract-and-run \
            >/tmp/murmur-appimage-smoke.log 2>&1 &
          PID=$!
          for i in $(seq 1 30); do
            sleep 1
            if ! kill -0 "$PID" 2>/dev/null; then
              tail -80 /tmp/murmur-appimage-smoke.log || true
              echo "ERROR: AppImage exited during smoke test"
              exit 1
            fi
            grep -q '\[main\] App mounted' "$LOG" 2>/dev/null && break
          done
          grep -q '\[main\] App mounted' "$LOG" || { echo "ERROR: AppImage frontend did not mount"; exit 1; }
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true

      - name: Audit packaged CUDA libraries
        run: |
          APPIMAGE=$(find app/src-tauri/target/release/bundle/appimage -maxdepth 1 -type f -name '*.AppImage' -print -quit)
          rm -rf squashfs-root
          "$APPIMAGE" --appimage-extract >/dev/null
          find squashfs-root -type f \( -name 'libcuda*' -o -name 'libcublas*' -o -name 'libnv*' \) \
            -print | sort | tee /tmp/murmur-packaged-cuda-libraries.txt
          {
            echo "### Packaged CUDA libraries"
            echo '```'
            cat /tmp/murmur-packaged-cuda-libraries.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # Match the NVIDIA driver library, not the legitimate CUDA runtime
          # (libcudart.so), whose name shares the same prefix.
          if find squashfs-root -type f -name 'libcuda.so*' -print -quit | grep -q .; then
            echo "ERROR: AppImage must not contain the runner-local NVIDIA driver stub"
            exit 1
          fi

      - name: Stage immutable Linux artifacts
        env:
          SOURCE_SHA: ${{ needs.context.outputs.source-sha }}
        run: |
          mkdir -p release-artifacts
          find app/src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' \
            -exec cp {} release-artifacts/ \;
          find app/src-tauri/target/release/bundle/appimage -maxdepth 1 -type f \
            \( -name '*.AppImage' -o -name '*.AppImage.sig' \) \
            -exec cp {} release-artifacts/ \;
          python3 scripts/release_artifacts.py record \
            --platform linux \
            --platform-key "linux-$(uname -m)" \
            --artifacts release-artifacts \
            --commit-sha "$SOURCE_SHA" \
            --run-id "$GITHUB_RUN_ID"

      - name: Upload immutable Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-${{ needs.context.outputs.source-sha }}
          path: release-artifacts
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: true

[package]
name = "ui"
version = "0.8.8"
description = "A Tauri App"
authors = ["you"]
edition = "2021"

[lib]
name = "ui_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api", "tray-icon"] }
tauri-plugin-opener = "2"
tauri-plugin-autostart = "2"
tauri-plugin-updater = "2"
tauri-plugin-notification = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["process", "io-util", "sync", "rt", "fs"] }
base64 = "0.22"
whisper-rs = { version = "0.15", features = ["log_backend"] }
arboard = "3"
hound = "3.5"
dirs = "5"
cpal = "0.15"
# Forked for issue #153 — see app/src-tauri/src/keyboard.rs header comment.
# Patches: (1) re-enable CGEventTap on kCGEventTapDisabledByTimeout/ByUserInput
# and expose tap/runloop/stopped handles (macos_reenable_tap, macos_is_tap_enabled,
# macos_listener_stopped, stop); (2) absolute-flag-state modifier resolution with
# equal-flags resync heuristic to survive missed FlagsChanged transitions.
# Apple docs: CGEventTapEnable, CGEventTapIsEnabled, CFRunLoopStop.
rdev = { path = "../../../../rdev" }
memory-stats = "1"
reqwest = { version = "0.12", default-features = false, features = ["stream", "rustls-tls"] }
futures-util = { version = "0.3", default-features = false, features = ["alloc"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter", "fmt"] }
tracing-appender = "0.2"
chrono = { version = "0.4", default-features = false, features = ["clock"] }

[target.'cfg(target_os = "macos")'.dependencies]
whisper-rs = { version = "0.15", features = ["metal"] }
objc2 = "0.6"
objc2-app-kit = { version = "0.3", features = ["NSWindow", "NSScreen", "NSApplication", "NSRunningApplication"] }
objc2-foundation = "0.3"
block2 = "0.6"

[target.'cfg(target_os = "linux")'.dependencies]
rdev = { path = "../../../../rdev", features = ["x11"] }
whisper-rs = { version = "0.15", features = ["cuda"] }

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
